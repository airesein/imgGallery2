# 站点配置
name: "Ziworld"
url: "https://gallery.ziworld.top"
description: "没有什么是完美的，这个世界并不完美，所以才显得美丽。"
keywords: "ziworld, images, 壁纸"
favicon: "/favicon.ico"

# Meta 标签（留空则自动用 name/description）
